networks:
  flink-network:
    driver: bridge

services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    networks:
      - flink-network
    ports:
      - "9092:9092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --kafka-addr 0.0.0.0:9092
      - --advertise-kafka-addr redpanda:9092

  jobmanager:
    build: .
    container_name: jobmanager
    networks:
      - flink-network
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address:jobmanager
    volumes:
      - ./src:/opt/src

  taskmanager:
    build: .
    container_name: taskmanager
    networks:
      - flink-network
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address:jobmanager
    volumes:
      - ./src:/opt/src

  postgres:
    image: postgres:15
    container_name: postgres
    networks:
      - flink-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres