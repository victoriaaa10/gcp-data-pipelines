version: "3.8"

services:
  # Database (PostgreSQL)
  postgres:
    image: postgres:18-alpine
    container_name: kestra-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kestra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kestra_password}
      POSTGRES_DB: ${POSTGRES_DB:-kestra}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kestra-network

  # 2. Kestra Server (Web UI)
  kestra:
    image: kestra/kestra:latest
    container_name: kestra-server
    command: server standalone
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
            postgres:
              url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kestra}
              username: ${POSTGRES_USER:-kestra}
              password: ${POSTGRES_PASSWORD:-kestra_password}
    networks:
      - kestra-network

  # Kestra Worker (The Orchestrator)
  kestra-worker:
    image: kestra/kestra:latest  
    container_name: kestra-worker
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # CRITICAL: Allows the Kestra Worker to start NEW containers (Task Runners)
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
    env_file: .env
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: postgres
            postgres:
              url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kestra}
              username: ${POSTGRES_USER:-kestra}
              password: ${POSTGRES_PASSWORD:-kestra_password}
    networks:
      - kestra-network

  # Custom Python Image
  nytaxi-ingest:
    build:
      context: ..
      dockerfile: kestra/Dockerfile
    image: nytaxi-ingest:latest
    profiles: ["build-only"] 

networks:
  kestra-network:
    driver: bridge