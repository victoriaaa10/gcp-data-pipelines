id: taxi_ingestion
namespace: zoomcamp
description: EL pipeline ingesting NYC taxi trip data from the web to GCS (Parquet) and loading it into BigQuery raw tables.

inputs:
  - id: service
    type: SELECT
    defaults: yellow
    values: [yellow, green, fhv]
  - id: year
    type: SELECT
    defaults: "2019"
    values: ["2019", "2020"]
  - id: month
    type: SELECT
    defaults: "01"
    values: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10", "11", "12"]

tasks:
  - id: ingest_to_gcs
    type: io.kestra.plugin.scripts.python.Commands
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      image: nytaxi-ingest:latest
      pullPolicy: NEVER
      host: unix:///var/run/docker.sock

    inputFiles:
      gcp-creds.json: "{{ kv('GCP_ADC_JSON') }}"

    env:
      GCS_BUCKET_NAME: "{{ kv('GCS_BUCKET_NAME') }}"
      GCP_PROJECT_ID: "{{ kv('GCP_PROJECT_ID') }}"
      BQ_DATASET_RAW: "{{ kv('BQ_DATASET_RAW') }}"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/gcp-creds.json"
      GOOGLE_CLOUD_PROJECT: "{{ kv('GCP_PROJECT_ID') }}"

    commands:
      - cp gcp-creds.json /app/gcp-creds.json
      - python /app/scripts/ingest_web_to_gcs.py --service {{ inputs.service }} --year {{ inputs.year }} --month {{ inputs.month }}

  - id: log_completion
    type: io.kestra.plugin.core.log.Log
    message: "Successfully loaded {{ inputs.service }} {{ inputs.year }}-{{ inputs.month }} into BigQuery."